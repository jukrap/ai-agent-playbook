name: Bug report
description: Report a reproducible problem in the CLI, MCP server, skills, templates, or docs.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include credentials, tokens, private paths, or internal URLs.
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `aapb --version` or note the npm package version.
      placeholder: "0.5.0"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP
        - Skills
        - Project playbook template
        - Adapter
        - Documentation
        - Packaging or install
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: List the smallest steps or commands that reproduce the problem.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Python version if relevant, package manager, and AI app or CLI.
      placeholder: |
        OS:
        Node:
        Python:
        Package manager:
        AI app:
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste only sanitized output.
      render: shell
