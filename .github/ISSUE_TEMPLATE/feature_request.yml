name: Feature request
description: Suggest a new capability, command, MCP surface, skill, template, or workflow.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP
        - Skills
        - Python engine
        - Project playbook template
        - Adapter
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: risk
    attributes:
      label: Compatibility or safety concerns
      description: Note migration, write-safety, packaging, or security concerns if any.
