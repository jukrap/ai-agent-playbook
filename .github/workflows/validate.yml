name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docs-and-skills:
    name: Docs and skills
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install runtime dependencies
        shell: pwsh
        run: npm install --no-package-lock --ignore-scripts --no-audit --no-fund

      - name: Validate runtime syntax
        shell: pwsh
        run: npm run check

      - name: Test runtime CLI
        shell: pwsh
        run: npm test

      - name: Validate skills
        shell: pwsh
        run: ./scripts/validate-skills.ps1

      - name: Validate translations
        shell: pwsh
        run: ./scripts/validate-translations.ps1

      - name: Validate installer
        shell: pwsh
        run: ./install.ps1 -SkipValidation -WhatIf

      - name: Validate updater
        shell: pwsh
        run: ./update.ps1 -SkipValidation -WhatIf
